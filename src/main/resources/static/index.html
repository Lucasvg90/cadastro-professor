<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciamento de Professores</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 900px;
        margin: 2.5rem auto;
        padding: 0 1.25rem 3rem;
        color: #333;
        line-height: 1.5;
      }
      h1 {
        color: #1f4e79;
        margin-bottom: 0.5rem;
      }
      h2 {
        color: #1f4e79;
        margin-top: 2rem;
      }
      button {
        background: #1f4e79;
        color: #fff;
        border: none;
        padding: 10px 16px;
        cursor: pointer;
        border-radius: 4px;
      }
      .btnCadastrar {
      }
      button:hover {
        background: #163a5a;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th,
      td {
        padding: 0.85rem 1rem;
        border: 1px solid #cfd8dc;
        text-align: left;
      }
      th {
        background: #e8f0ff;
      }
      .error {
        color: #b00020;
        margin-top: 0.75rem;
      }
      .site-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1e2d1e;
        color: #7a9a7a;
        font-size: 0.75rem;
        text-align: center;
        padding: 0.6rem 1rem;
        border-top: 1px solid #2e4a2e;
      }
      .site-footer a {
        color: #6db33f;
        text-decoration: none;
      }
      .site-footer a:hover {
        text-decoration: underline;
      }
      .botoes-topo {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 0.75rem;
      }
      
    </style>
  </head>
  <body>
    <h1>Gerenciamento de Professores</h1>
    <p>Lista dos professores cadastrados no backend.</p>

    <section>
      <h2>Professores</h2>

      <div class="botoes-topo">
        <button id="btnListar">Recarregar lista</button>

        <a href="form.html" style="text-decoration: none">
          <button id="btnCadastrar">Cadastrar Professor</button>
        </a>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Matrícula</th>
            <th>Disciplina</th>
            <th>Ativo</th>
          </tr>
        </thead>
        <tbody id="resultadoLista"></tbody>
      </table>
    </section>

    <footer class="site-footer">
      Gerado pelo
      <a
        href="https://ftsuda-senac.github.io/tads-spring-initializr/"
        target="_blank"
        rel="noopener noreferrer"
        >TADS Spring Initializr</a
      >
      — v1.1.6 <br />Lucas de Sousa Moura / Paulo Henrique Candido da Silva -
      3TADSNA - 2026<br />
      Criado a partir do Claude Code e Github Copilot
    </footer>
    <script>
      async function listarPessoas() {
        try {
          const httpResp = await fetch("/pessoas");
          if (!httpResp.ok) {
            throw new Error("Erro HTTP " + httpResp.status);
          }
          const dados = await httpResp.json();
          const tbodyEl = document.getElementById("resultadoLista");
          for (const p of dados) {
            tbodyEl.insertAdjacentHTML(
              "beforeend",
              `<tr>
            <td>${p.id}</td>
            <td>${p.nome}</td>
            <td>${p.username}</td>
            <td>E-mail: ${p.email}</td>
          </tr>`,
            );
          }

          document.getElementById("nome").textContent = dados.nome;
          document.getElementById("id").textContent = dados.id;
          document.getElementById("username").textContent = dados.username;
          document.getElementById("email").textContent = dados.email;
          document.getElementById("dataNascimento").textContent =
            dados.dataNascimento;
        } catch (err) {
          alert("Erro na requisição:\n" + err.message);
        }
      }
      document.getElementById("btnListar").onclick = async (evt) => {
        listarPessoas();
      };

      async function listarProfessores() {
        const mensagem = document.getElementById("mensagemErro");
        mensagem.textContent = "";
        const tbodyEl = document.getElementById("resultadoLista");
        tbodyEl.innerHTML = "";

        try {
          const response = await fetch("/api/professores");
          if (!response.ok) {
            throw new Error("Erro HTTP " + response.status);
          }
          const dados = await response.json();
          if (!Array.isArray(dados) || dados.length === 0) {
            tbodyEl.innerHTML =
              '<tr><td colspan="5">Nenhum professor cadastrado.</td></tr>';
            return;
          }

          for (const p of dados) {
            tbodyEl.insertAdjacentHTML(
              "beforeend",
              `<tr>
            <td>${p.id}</td>
            <td>${p.nome}</td>
            <td>${p.matricula}</td>
            <td>${p.disciplina}</td>
            <td>${p.ativo ? "Sim" : "Não"}</td>
          </tr>`,
            );
          }
        } catch (err) {
          document.getElementById("mensagemErro").textContent =
            "Erro ao carregar a lista: " + err.message;
        }
      }

      document
        .getElementById("btnListar")
        .addEventListener("click", listarProfessores);
      window.addEventListener("DOMContentLoaded", listarProfessores);
    </script>
  </body>
</html>
