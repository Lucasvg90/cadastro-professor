<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Professor</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 520px;
        margin: 20px auto;
        padding: 0 20px;
      }
      .campo {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
      }
      input[type="text"],
      select {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
      }
      .checkbox-inline {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .error-msg {
        color: red;
        font-size: 0.9rem;
        margin-top: 4px;
        min-height: 1em;
      }
      button {
        background-color: #007bff;
        color: #fff;
        border: none;
        padding: 10px 16px;
        cursor: pointer;
        border-radius: 4px;
      }
      button:hover {
        background-color: #0056b3;
      }
      .site-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1e2d1e;
        color: #7a9a7a;
        font-size: 0.75rem;
        text-align: center;
        padding: 0.6rem 1rem;
        border-top: 1px solid #2e4a2e;
      }
      .site-footer a {
        color: #6db33f;
        text-decoration: none;
      }
      .site-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>Cadastro de Professor</h1>
    <form id="professorForm" novalidate>
      <div class="campo">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required maxlength="100" />
        <p id="err-nome" class="error-msg"></p>
      </div>

      <div class="campo">
        <label for="matricula">Matrícula:</label>
        <input type="text" id="matricula" name="matricula" required maxlength="20" />
        <p id="err-matricula" class="error-msg"></p>
      </div>

      <div class="campo">
        <label for="disciplina">Disciplina:</label>
        <input type="text" id="disciplina" name="disciplina" required maxlength="50" />
        <p id="err-disciplina" class="error-msg"></p>
      </div>

      <div class="campo checkbox-inline">
        <input type="checkbox" id="ativo" name="ativo" />
        <label for="ativo">Ativo</label>
      </div>

      <button type="submit">Cadastrar Professor</button>
    </form>

    <footer class="site-footer">
      Gerado pelo
      <a
        href="https://ftsuda-senac.github.io/tads-spring-initializr/"
        target="_blank"
        rel="noopener noreferrer"
        >TADS Spring Initializr</a
      >
      — v1.1.6 <br />Lucas de Sousa Moura / Paulo Henrique Candido da Silva -
      3TADSNA - 2026<br />
      Criado a partir do Claude Code e Github Copilot
    </footer>

    <script>
      document.getElementById('professorForm').addEventListener('submit', async (evt) => {
        evt.preventDefault();
        limparErros();

        const formEl = evt.target;
        const dados = {
          nome: formEl.nome.value.trim(),
          matricula: formEl.matricula.value.trim(),
          disciplina: formEl.disciplina.value.trim(),
          ativo: formEl.ativo.checked
        };

        try {
          const response = await fetch('/api/professores', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
          });

          if (!response.ok) {
            const payload = await response.json();
            if (payload && payload.errors) {
              exibirErros(payload.errors);
            } else {
              alert('Erro ao cadastrar professor. Status: ' + response.status);
            }
            return;
          }

          alert('Professor cadastrado com sucesso!');
          formEl.reset();
        } catch (error) {
          console.error('Erro na conexão:', error);
          alert('Não foi possível conectar ao servidor.');
        }
      });

      function limparErros() {
        document.querySelectorAll('.error-msg').forEach((el) => {
          el.textContent = '';
        });
      }

      function exibirErros(erros) {
        if (!Array.isArray(erros)) return;
        for (const erro of erros) {
          const elementoErro = document.getElementById(`err-${erro.field}`);
          if (elementoErro) {
            elementoErro.textContent = erro.defaultMessage;
          }
        }
      }
    </script>
  </body>
</html>
  </body>
</html>
